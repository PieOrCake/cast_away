<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Cast Away — GW2 Nexus Addon Icon
    Tan/beige on transparent background, GW2 UI style
    Designed at 64x64, scales cleanly to 32x32
  -->

  <!-- wave 1 -->
  <path d="M1 9 Q8 4, 15 9 Q22 14, 29 9 Q36 4, 43 9 Q50 14, 56 10" stroke="#3d2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M1 9 Q8 4, 15 9 Q22 14, 29 9 Q36 4, 43 9 Q50 14, 56 10" stroke="#f5e8c8" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- wave 2 -->
  <path d="M1 16 Q7 12, 14 16 Q21 20, 28 16 Q35 12, 42 16 Q49 20, 56 16" stroke="#3d2a10" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M1 16 Q7 12, 14 16 Q21 20, 28 16 Q35 12, 42 16 Q49 20, 56 16" stroke="#c8a96e" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- fishing line -->
  <line x1="54" y1="0" x2="54" y2="27" stroke="#3d2a10" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="0" x2="54" y2="27" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round"/>

  <!-- hook J -->
  <path d="M54 27 Q54 36, 47 36 Q41 36, 41 30" stroke="#3d2a10" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M54 27 Q54 36, 47 36 Q41 36, 41 30" stroke="#f5e8c8" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- barb -->
  <path d="M41 30 L38 34" stroke="#3d2a10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M41 30 L38 34" stroke="#f5e8c8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- FISH group — offset right to leave room for large tail on left -->
  <g transform="translate(14, 24)">

    <!-- big forked tail -->
    <path d="M0 17 L-13 4  L3 17 L-13 30 Z" fill="#3d2a10"/>
    <path d="M0 17 L-12 5  L3 17 L-12 29 Z" fill="#8a6a3a"/>
    <path d="M0 17 L-8  9  L3 17 L-8  25 Z" fill="#c8a96e" opacity="0.5"/>
    <!-- notch curve -->
    <path d="M-13 4 Q-4 17, -13 30" stroke="#3d2a10" stroke-width="1.5" fill="none"/>
    <path d="M-13 4 Q-6 17, -13 30" stroke="#8a6a3a" stroke-width="0.8" fill="none"/>

    <!-- body shadow -->
    <ellipse cx="23" cy="17" rx="24" ry="13" fill="#3d2a10"/>
    <!-- body fill -->
    <ellipse cx="23" cy="17" rx="23" ry="12" fill="#c8a96e"/>
    <!-- belly highlight -->
    <ellipse cx="17" cy="13" rx="10" ry="6" fill="#f5e8c8" opacity="0.55"/>

    <!-- dorsal fin -->
    <path d="M14 5 Q22 0, 34 5" stroke="#3d2a10" stroke-width="3.5" fill="#3d2a10" stroke-linecap="round"/>
    <path d="M14 5 Q22 0.5, 34 5" stroke="#8a6a3a" stroke-width="2" fill="#8a6a3a" stroke-linecap="round"/>
    <path d="M14 5 Q22 1.5, 34 5" stroke="#c8a96e" stroke-width="0.8" fill="none" stroke-linecap="round"/>

    <!-- pectoral fin -->
    <path d="M27 20 Q35 29, 25 34" stroke="#3d2a10" stroke-width="2.5" fill="#3d2a10" stroke-linecap="round"/>
    <path d="M27 20 Q34 28, 25 33" stroke="#8a6a3a" stroke-width="1.5" fill="#8a6a3a" stroke-linecap="round"/>

    <!-- scale arcs -->
    <path d="M11 13 Q17 8,  23 13" stroke="#8a6a3a" stroke-width="1" fill="none"/>
    <path d="M19 17 Q25 12, 31 17" stroke="#8a6a3a" stroke-width="1" fill="none"/>
    <path d="M11 21 Q17 16, 23 21" stroke="#8a6a3a" stroke-width="1" fill="none"/>

    <!-- eye -->
    <circle cx="38" cy="16" r="5" fill="#3d2a10"/>
    <circle cx="39.2" cy="14.8" r="1.8" fill="#f5e8c8"/>

    <!-- mouth open toward hook -->
    <path d="M44 14 Q47 17, 44 20" stroke="#3d2a10" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M44 14 Q46.5 17, 44 20" stroke="#8a6a3a" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  </g>

</svg>
